name: "🌙 Endfield Daily Sign-in"

on:
  # Chạy lúc 3:00 sáng GMT+7 = 20:00 UTC hôm trước
  schedule:
    - cron: "0 20 * * *"

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  sign-in:
    name: "Daily Sign-in"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: pip install -r requirements.txt

      - name: "✍️ Run Sign-in"
        env:
          # Chỉ cần 1 Secret duy nhất!
          ENDFIELD_CONFIG: ${{ secrets.ENDFIELD_CONFIG }}
          PYTHONIOENCODING: utf-8
        run: python sign_in.py
